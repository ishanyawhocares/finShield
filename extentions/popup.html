<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 300px; font-family: 'Segoe UI', sans-serif; padding: 15px; text-align: center; }
        h2 { margin-top: 0; color: #333; }
        #result-box {
            padding: 20px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            margin-top: 15px;
            background-color: #eee; /* Default */
        }
        #url-display { font-size: 12px; color: #666; margin-top: 10px; word-break: break-all;}
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 2s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>🛡️ FinShield</h2>
    <div id="url-display">Scanning...</div>
    
    <div id="result-box">
        <div class="loader"></div>
    </div>

    <script src="popup.js"></script>
</body>
